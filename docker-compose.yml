# Loads container env from .env.docker (see bitmerchant/.env.docker).
# For Compose variable substitution in this file, either:
#   - keep defaults below, or
#   - run: docker compose --env-file .env.docker up --build
services:
  app:
    build: .
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    # Override surface URLs so localhost:8079 serves all surfaces (no subdomain redirects in dev)
    environment:
      BASE_URL: http://localhost:8079
      PUBLIC_BASE_URL: http://localhost:8079
      CUSTOMER_BASE_URL: http://localhost:8079
      MERCHANT_BASE_URL: http://localhost:8079
      COOKIE_SECURE: "false"
      DISABLE_RATE_LIMIT: "true"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "8080:8080"
      - "8079:8079"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:17-alpine
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitmerchant -d bitmerchant"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
